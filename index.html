<!DOCTYPE html>
<html lang="en">

<title>Moment by Moment — drawing closer to God, one moment at a time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --read-font:'Inter',system-ui,-apple-system,sans-serif;
    --ink:#17263f;
    --ink-soft:#4b5b73;
    --parchment:#eef4fa;
    --parchment-2:#e0eaf3;
    --parchment-card:#f9fcff;
    --line:#cfdce8;
    --vespers:#0f2440;
    --vespers-2:#1b3a5e;
    --vespers-soft:#8194b0;
    --gilt:#19827b;
    --gilt-2:#279c93;
    --gilt-glow:#66cabf;
    --sage:#3b7f8a;
    --sage-2:#579fa6;
    --rose:#b0564d;
    --gold:#cba24e;
    --shadow:0 1px 2px rgba(15,36,64,.05),0 14px 44px rgba(15,36,64,.09);
    --radius:16px;
    --radius-lg:22px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--parchment);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }
  #root{min-height:100vh}
  .serif{font-family:var(--read-font)}
  .display{font-family:'Fraunces',Georgia,serif;letter-spacing:-.012em}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--gilt)}
  :focus-visible{outline:2px solid var(--gilt);outline-offset:2px;border-radius:6px}

  /* ---- shell ---- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,#12325a,var(--vespers) 88%);color:#eaf1f8;
    padding:14px 20px 10px;
    border-bottom:1px solid rgba(102,202,191,.16);
  }
  .topbar .toprow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px}
  .topbar .tb-right{justify-self:end}
  .brand{justify-self:center;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px}
  .brand img.brandmark{width:30px;height:30px;border-radius:50%;display:block;margin-bottom:4px;flex:none}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:23px;margin:0;letter-spacing:-.008em;color:#fff;line-height:1.1}
  .brand small{display:block;font-family:'Spectral',Georgia,serif;font-style:italic;font-weight:400;font-size:12px;letter-spacing:0;text-transform:none;color:#a9c0da;margin-top:2px}
  .navrow{margin-top:10px;padding-top:9px;border-top:1px solid rgba(255,255,255,.09)}
  .nav{display:flex;gap:22px;justify-content:center;flex-wrap:wrap}
  .nav button{
    background:none;border:none;color:rgba(233,241,248,.66);
    font-family:'Inter',sans-serif;font-size:13.5px;padding:4px 1px 6px;font-weight:500;
    border-bottom:2px solid transparent;transition:color .15s;cursor:pointer;white-space:nowrap;
  }
  .nav button.active{color:#fff;font-weight:600;border-bottom-color:var(--gilt-glow)}
  .nav button:hover{color:#fff}
  .aipill{display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;
    padding:5px 11px;border-radius:20px;white-space:nowrap;cursor:pointer;
    background:rgba(102,202,191,.12);color:var(--gilt-glow);border:1px solid rgba(102,202,191,.34)}
  .aipill .aidot{width:7px;height:7px;border-radius:50%;background:var(--gilt-glow);box-shadow:0 0 7px var(--gilt-glow);flex:none}
  .wrap{max-width:900px;margin:0 auto;padding:40px 24px 120px}

  /* ---- generic ---- */
  .card{background:var(--parchment-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .eyebrow{display:block;font-size:11px;letter-spacing:2.8px;text-transform:uppercase;color:var(--gilt);font-weight:600;margin-bottom:10px}
  .muted{color:var(--ink-soft)}
  .btn{
    background:var(--vespers);color:#f4efff;border:none;border-radius:13px;
    padding:14px 24px;font-size:14.5px;font-weight:500;transition:transform .12s ease,background .2s,filter .2s;
  }
  .btn:hover{background:var(--vespers-2)}
  .btn:active{transform:translateY(1px)}
  .btn.gilt{background:linear-gradient(180deg,var(--gilt-2),var(--gilt));color:#ffffff;font-weight:600}
  .btn.gilt:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--parchment-2)}
  .btn:disabled{opacity:.45;cursor:default;transform:none}
  .btn.sm{padding:9px 15px;font-size:13px;border-radius:10px}
  textarea,input[type=text]{
    width:100%;font-family:var(--read-font);font-size:16px;color:var(--ink);
    background:var(--parchment-card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;resize:vertical;transition:border-color .15s,box-shadow .15s;
  }
  textarea:focus,input:focus{border-color:var(--gilt);box-shadow:0 0 0 3px rgba(25,130,123,.12)}
  label.field{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:0 0 6px 2px;letter-spacing:.2px}

  @media (prefers-reduced-motion:no-preference){
    .settle{animation:settle .5s cubic-bezier(.2,.7,.2,1)}
    @keyframes settle{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }

  /* ---- home doors ---- */
  .greet{margin:6px 0 34px}
  .greet h2{font-family:'Fraunces',serif;font-weight:600;font-size:35px;line-height:1.1;margin:8px 0 6px;letter-spacing:-.015em}
  /* hero banner */
  .hero{position:relative;border-radius:var(--radius-lg);overflow:hidden;margin:0 0 26px;box-shadow:var(--shadow);aspect-ratio:16/8}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,36,64,.05) 0%,rgba(15,36,64,.15) 45%,rgba(15,36,64,.82) 100%)}
  .hero .htext{position:absolute;left:22px;right:22px;bottom:20px;color:#fff}
  .hero .htext .eyebrow{color:var(--gilt-glow);margin-bottom:6px}
  .hero .htext h2{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1.12;margin:0;letter-spacing:-.015em;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.35)}
  @media(max-width:520px){ .hero .htext h2{font-size:24px} .hero{aspect-ratio:16/10} }
  /* door image thumbnail */
  .door .dimg{width:60px;height:60px;border-radius:13px;object-fit:cover;flex:none;box-shadow:0 2px 8px rgba(15,36,64,.18)}
  @media(max-width:520px){ .door .dimg{width:52px;height:52px} }
  /* subtle section-header image band */
  .imgband{position:relative;border-radius:var(--radius);overflow:hidden;margin:0 0 18px;min-height:96px;display:flex;align-items:flex-end;box-shadow:var(--shadow)}
  .imgband img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .imgband .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,36,64,.25),rgba(15,36,64,.78))}
  .imgband .bt{position:relative;padding:14px 18px;color:#fff}
  .imgband .bt h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin:0;color:#fff;letter-spacing:-.01em;text-shadow:0 1px 10px rgba(0,0,0,.4)}
  .imgband .bt p{margin:3px 0 0;font-size:13px;color:#dfe8f4}
  .doors{display:grid;gap:16px}
  .door{
    text-align:left;width:100%;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--parchment-card);padding:23px 22px 23px 24px;box-shadow:var(--shadow);
    display:flex;gap:17px;align-items:flex-start;transition:transform .16s ease,border-color .2s,box-shadow .2s;
    color:var(--ink);-webkit-appearance:none;appearance:none;cursor:pointer;
  }
  .door:hover{transform:translateY(-2px);border-color:var(--gilt-2);box-shadow:0 2px 4px rgba(15,36,64,.05),0 18px 50px rgba(15,36,64,.12)}
  .door .rune{font-family:'Fraunces',serif;font-size:31px;color:var(--gilt);line-height:1;margin-top:1px;flex:none;width:36px;text-align:center}
  .door h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 4px;color:var(--ink);letter-spacing:-.008em}
  .door p{margin:0;font-size:13.5px;line-height:1.5;color:var(--ink-soft)}
  .stat-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
  .stat{flex:1;min-width:110px;background:var(--vespers);color:#efeaf7;border-radius:12px;padding:13px 15px}
  .stat b{font-family:'Fraunces',serif;font-size:23px;font-weight:600;display:block;color:var(--gilt-glow)}
  .stat span{font-size:11.5px;letter-spacing:.4px;color:var(--vespers-soft)}

  /* ---- passage / illuminated ---- */
  .passage-ref{font-family:'Inter';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gilt);font-weight:600;margin-bottom:2px}
  .passage-transl{font-size:11px;color:var(--ink-soft);letter-spacing:.5px}
  .passage{font-family:var(--read-font);font-size:20px;line-height:1.78;color:#17263f;margin-top:16px}
  .passage .drop{
    float:left;font-family:'Fraunces',serif;font-weight:600;
    font-size:70px;line-height:.8;padding:6px 13px 0 0;margin-top:4px;
    color:var(--gilt);text-shadow:0 1px 0 rgba(105,79,26,.25);
  }
  .passage sup{color:var(--gilt);font-size:.62em;font-weight:600;padding:0 3px 0 1px;vertical-align:super}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:28px 0}
  .hl-hint{font-size:12px;color:var(--gilt);margin:2px 0 10px;font-weight:500}
  .draft-x{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:none;background:var(--parchment-2);color:var(--ink-soft);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s,color .15s}
  .draft-x:hover{background:var(--rose);color:#fff}
  .vhl{cursor:pointer;border-radius:5px;padding:1px 2px;margin:0 -2px;transition:background .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
  .vhl:hover{background:rgba(203,162,78,.14)}
  .vhl.on{background:linear-gradient(180deg,rgba(203,162,78,.28),rgba(203,162,78,.34));box-shadow:0 0 0 1px rgba(203,162,78,.4)}
  .vhl.on sup{color:var(--gold)}

  /* ---- stepper ---- */
  .steps{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .steps .s{font-size:11px;letter-spacing:.6px;color:var(--ink-soft);padding:5px 10px;border-radius:20px;border:1px solid var(--line);text-transform:uppercase;font-weight:600}
  .steps .s.on{background:var(--vespers);color:var(--gilt-glow);border-color:var(--vespers)}
  .steps .s.done{color:var(--sage);border-color:var(--sage)}
  .q{font-family:var(--read-font);font-size:17.5px;line-height:1.5;color:#17263f;margin:0 0 4px}
  .qwrap{padding:15px 0;border-bottom:1px solid var(--line)}
  .qwrap:last-child{border-bottom:none}

  /* ---- verse pick ---- */
  .vpick{font-family:var(--read-font);font-size:15.5px;line-height:1.6;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--parchment-card);transition:border-color .15s}
  .vpick:hover{border-color:var(--gilt-2)}
  .vpick.sel{border-color:var(--gilt);background:#e3f2f0;box-shadow:inset 0 0 0 1px var(--gilt)}

  /* ---- scripture map ---- */
  .mapgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}
  .tile{position:relative;aspect-ratio:1;border-radius:8px;border:1px solid var(--line);background:var(--parchment-2);overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding:4px}
  .tile .fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--sage-2),var(--sage));opacity:.9;transition:height .5s ease}
  .tile.gilt .fill{background:linear-gradient(180deg,var(--gilt-glow),var(--gilt))}
  .tile abbr{position:relative;font-size:10px;font-weight:600;color:var(--ink);text-decoration:none;line-height:1;text-align:center;font-family:'Inter'}
  .tile.full abbr{color:#ffffff}
  .testlabel{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:20px 0 10px;color:var(--vespers)}

  /* ---- journal list ---- */
  .tabs{display:flex;gap:4px;margin-bottom:22px;border-bottom:1px solid var(--line)}
  .tabs button{background:none;border:none;padding:11px 4px;margin-right:18px;font-size:14px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;letter-spacing:.1px}
  .tabs button.on{color:var(--vespers);border-bottom-color:var(--gilt)}
  .entry{padding:18px 0;border-bottom:1px solid var(--line)}
  .entry .meta{font-size:11.5px;letter-spacing:.6px;color:var(--gilt);text-transform:uppercase;font-weight:600}
  .entry .rf{font-family:var(--read-font);font-size:16px;line-height:1.6;margin:8px 0 0;color:#17263f;white-space:pre-wrap}
  .prayer{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .prayer .body{flex:1;font-family:var(--read-font);font-size:15.5px;color:#17263f}
  .prayer.answered .body{color:var(--ink-soft)}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:20px}
  .badge.ans{background:rgba(109,122,78,.16);color:var(--sage)}

  /* ---- swipe to delete ---- */
  .swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:14px}
  .swipe-del{position:absolute;top:0;right:0;bottom:0;border:none;background:linear-gradient(90deg,#9e4a42,var(--rose));color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.4px;cursor:pointer;text-transform:uppercase}
  .swipe-card{position:relative;touch-action:pan-y;will-change:transform;background:var(--parchment)}
  .swipe-grip{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:22px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--vespers-soft);opacity:.5;pointer-events:auto;cursor:pointer;z-index:2}
  .swipe-grip:hover{opacity:.9}

  /* ---- journal timeline (the Walk) ---- */
  .timeline{position:relative;margin-top:10px;padding-left:24px}
  .timeline:before{content:'';position:absolute;left:5px;top:8px;bottom:14px;width:2px;background:linear-gradient(var(--gilt-2),var(--parchment-2))}
  .tl-item{position:relative}
  .tl-item:before{content:'';position:absolute;left:-24px;top:19px;width:11px;height:11px;border-radius:50%;background:var(--parchment-card);border:2px solid var(--gilt);z-index:1}
  .tl-item.answered:before{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(203,162,78,.16)}
  .leaf{background:var(--parchment-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 34px 16px 18px;transition:border-color .2s}
  .leaf:hover{border-color:var(--gilt-2)}
  .leaf .ld{font-size:11px;letter-spacing:.7px;color:var(--gilt);text-transform:uppercase;font-weight:600}
  .leaf .lr{font-family:'Fraunces',serif;font-size:17.5px;color:var(--ink);margin:5px 0 0;font-weight:600;line-height:1.25;letter-spacing:-.006em}
  .leaf .lp{font-size:14.5px;color:var(--ink-soft);margin:8px 0 0;line-height:1.55;font-family:var(--read-font)}
  .leaf .lp.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .leaf .lquote{font-family:'Fraunces',serif;font-size:15.5px;font-style:italic;color:var(--gilt);margin:9px 0 0;line-height:1.5}
  .leaf .lsaid{font-size:14.5px;color:var(--sage);margin:10px 0 0;line-height:1.55;font-family:var(--read-font)}
  .leaf .lsaid b{font-size:11px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
  .leaf .lmore{font-size:12px;color:var(--gilt);font-weight:600;margin-top:9px;letter-spacing:.3px}
  .leaf .ldel{background:none;border:none;color:var(--rose);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 0 0;margin-top:8px}

  /* ---- onboarding ---- */
  .scale{display:flex;gap:6px;margin-top:9px}
  .scale button{flex:1;border:1px solid var(--line);background:var(--parchment-card);border-radius:9px;padding:9px 0;font-size:13px;color:var(--ink-soft);font-weight:600}
  .scale button.on{background:var(--vespers);color:var(--gilt-glow);border-color:var(--vespers)}
  .prog{height:4px;background:var(--parchment-2);border-radius:4px;overflow:hidden;margin:2px 0 20px}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--gilt),var(--gilt-glow));transition:width .4s}
  .chip{display:inline-block;background:var(--parchment-2);border:1px solid var(--line);border-radius:20px;padding:6px 13px;margin:0 6px 8px 0;font-size:13px;font-weight:500}
  .chip.on{background:var(--vespers);color:var(--gilt-glow);border-color:var(--vespers)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;background:var(--vespers);color:#f2eeff;padding:12px 20px;border-radius:30px;font-size:13.5px;box-shadow:0 10px 40px rgba(0,0,0,.3);z-index:60;border:1px solid rgba(199,163,92,.4)}
  .keyhint{font-size:12.5px;color:var(--ink-soft);background:var(--parchment-2);border:1px dashed var(--line);border-radius:10px;padding:11px 13px;margin-top:10px}
  @media(max-width:560px){
    .topbar{padding:13px 14px 9px}
    .topbar .toprow{grid-template-columns:1fr;justify-items:center;gap:9px}
    .topbar .tb-left{display:none}
    .topbar .tb-right{justify-self:center}
    .brand h1{font-size:21px;white-space:nowrap}
    .brand small{font-size:11.5px}
    .navrow{margin-top:9px;padding-top:9px}
    .nav{gap:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;max-width:100%}
    .nav::-webkit-scrollbar{display:none}
    .nav button{padding:4px 1px 6px;font-size:13px;flex:none;white-space:nowrap}
    .wrap{padding:20px 15px 96px}
    .door{padding:17px 16px}
    .door h3{font-size:17px}
    .passage .drop{font-size:54px}
  }
</style>
</head>

<div id="root"></div>
<script>/**

<script>const {
  useState,
  useEffect,
  useRef
} = React;
const SEED = {"stories": [{"id": "anxiety", "moment": "anxiety", "title": "Do Not Be Anxious", "reference": "Philippians 4:4-7", "book": "Philippians", "note": "Paul writes from prison, yet tells the Philippians to rejoice. His antidote to anxiety is not denial but presenting everything to God with thanksgiving.", "verses": [{"v": 4, "c": 4, "t": "Rejoice in the Lord always! Again I will say, “Rejoice!”"}, {"v": 5, "c": 4, "t": "Let your gentleness be known to all men. The Lord is at hand."}, {"v": 6, "c": 4, "t": "In nothing be anxious, but in everything, by prayer and petition with thanksgiving, let your requests be made known to God."}, {"v": 7, "c": 4, "t": "And the peace of God, which surpasses all understanding, will guard your hearts and your thoughts in Christ Jesus."}]}, {"id": "fear", "moment": "fear", "title": "Jesus Calms the Storm", "reference": "Mark 4:35-41", "book": "Mark", "note": "The disciples, several of them seasoned fishermen, are terrified in a storm the sea itself obeys once Jesus speaks. Fear and faith sit side by side here.", "verses": [{"v": 35, "c": 4, "t": "On that day, when evening had come, he said to them, “Let’s go over to the other side.”"}, {"v": 36, "c": 4, "t": "Leaving the multitude, they took him with them, even as he was, in the boat. Other small boats were also with him."}, {"v": 37, "c": 4, "t": "A big wind storm arose, and the waves beat into the boat, so much that the boat was already filled."}, {"v": 38, "c": 4, "t": "He himself was in the stern, asleep on the cushion, and they woke him up, and told him, “Teacher, don’t you care that we are dying?”"}, {"v": 39, "c": 4, "t": "He awoke, and rebuked the wind, and said to the sea, “Peace! Be still!” The wind ceased, and there was a great calm."}, {"v": 40, "c": 4, "t": "He said to them, “Why are you so afraid? How is it that you have no faith?”"}, {"v": 41, "c": 4, "t": "They were greatly afraid, and said to one another, “Who then is this, that even the wind and the sea obey him?”"}]}, {"id": "burnout", "moment": "burnout", "title": "Elijah Under the Broom Tree", "reference": "1 Kings 19:1-9", "book": "1 Kings", "note": "Right after his greatest victory, Elijah collapses in exhaustion and asks to die. God's first response is not a rebuke but sleep, food, and gentleness.", "verses": [{"v": 1, "c": 19, "t": "Ahab told Jezebel all that Elijah had done, and how he had killed all the prophets with the sword."}, {"v": 2, "c": 19, "t": "Then Jezebel sent a messenger to Elijah, saying, “So let the gods do to me, and more also, if I don’t make your life as the life of one of them by tomorrow about this time!”"}, {"v": 3, "c": 19, "t": "When he saw that, he arose, and ran for his life, and came to Beersheba, which belongs to Judah, and left his servant there."}, {"v": 4, "c": 19, "t": "But he himself went a day’s journey into the wilderness, and came and sat down under a juniper tree. Then he requested for himself that he might die, and said, “It is enough. Now, O Yahweh, take away my life; for I am not better than my fathers.”"}, {"v": 5, "c": 19, "t": "He lay down and slept under a juniper tree; and behold, an angel touched him, and said to him, “Arise and eat!”"}, {"v": 6, "c": 19, "t": "He looked, and behold, there was at his head a cake baked on the coals, and a jar of water. He ate and drank, and lay down again."}, {"v": 7, "c": 19, "t": "Yahweh’s angel came again the second time, and touched him, and said, “Arise and eat, because the journey is too great for you.”"}, {"v": 8, "c": 19, "t": "He arose, and ate and drank, and went in the strength of that food forty days and forty nights to Horeb, God’s Mountain."}, {"v": 9, "c": 19, "t": "He came to a cave there, and camped there; and behold, Yahweh’s word came to him, and he said to him, “What are you doing here, Elijah?”"}]}, {"id": "weariness", "moment": "weariness", "title": "He Gives Strength to the Weary", "reference": "Isaiah 40:28-31", "book": "Isaiah", "note": "Isaiah speaks to a people worn down by exile, reminding them the Creator does not grow tired, and neither will those who wait on him.", "verses": [{"v": 28, "c": 40, "t": "Haven’t you known? Haven’t you heard? The everlasting God, Yahweh, The Creator of the ends of the earth, doesn’t faint. He isn’t weary. His understanding is unsearchable."}, {"v": 29, "c": 40, "t": "He gives power to the weak. He increases the strength of him who has no might."}, {"v": 30, "c": 40, "t": "Even the youths faint and get weary, and the young men utterly fall;"}, {"v": 31, "c": 40, "t": "But those who wait for Yahweh will renew their strength. They will mount up with wings like eagles. They will run, and not be weary. They will walk, and not faint."}]}, {"id": "comfort", "moment": "comfort", "title": "The Lord Is My Shepherd", "reference": "Psalms 23", "book": "Psalms", "note": "David, once a shepherd himself, casts God as the one who leads, restores, and stays present even in the valley of the shadow.", "verses": [{"v": 1, "c": 23, "t": "Yahweh is my shepherd: I shall lack nothing."}, {"v": 2, "c": 23, "t": "He makes me lie down in green pastures. He leads me beside still waters."}, {"v": 3, "c": 23, "t": "He restores my soul. He guides me in the paths of righteousness for his name’s sake."}, {"v": 4, "c": 23, "t": "Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me. Your rod and your staff, they comfort me."}, {"v": 5, "c": 23, "t": "You prepare a table before me in the presence of my enemies. You anoint my head with oil. My cup runs over."}, {"v": 6, "c": 23, "t": "Surely goodness and loving kindness shall follow me all the days of my life, and I will dwell in Yahweh’s house forever."}]}, {"id": "overwhelm", "moment": "overwhelm", "title": "Mary and Martha", "reference": "Luke 10:38-42", "book": "Luke", "note": "Martha is busy with much serving while Mary sits at Jesus' feet. Jesus gently names the one thing that is needed.", "verses": [{"v": 38, "c": 10, "t": "As they went on their way, he entered into a certain village, and a certain woman named Martha received him into her house."}, {"v": 39, "c": 10, "t": "She had a sister called Mary, who also sat at Jesus’ feet, and heard his word."}, {"v": 40, "c": 10, "t": "But Martha was distracted with much serving, and she came up to him, and said, “Lord, don’t you care that my sister left me to serve alone? Ask her therefore to help me.”"}, {"v": 41, "c": 10, "t": "Jesus answered her, “Martha, Martha, you are anxious and troubled about many things,"}, {"v": 42, "c": 10, "t": "but one thing is needed. Mary has chosen the good part, which will not be taken away from her.”"}]}, {"id": "shame", "moment": "shame", "title": "The Prodigal Son Returns", "reference": "Luke 15:11-24", "book": "Luke", "note": "A son squanders everything and rehearses an apology, but the father runs to him before a word is spoken. A picture of grace that outpaces our shame.", "verses": [{"v": 11, "c": 15, "t": "He said, “A certain man had two sons."}, {"v": 12, "c": 15, "t": "The younger of them said to his father, ‘Father, give me my share of your property.’ He divided his livelihood between them."}, {"v": 13, "c": 15, "t": "Not many days after, the younger son gathered all of this together and traveled into a far country. There he wasted his property with riotous living."}, {"v": 14, "c": 15, "t": "When he had spent all of it, there arose a severe famine in that country, and he began to be in need."}, {"v": 15, "c": 15, "t": "He went and joined himself to one of the citizens of that country, and he sent him into his fields to feed pigs."}, {"v": 16, "c": 15, "t": "He wanted to fill his belly with the husks that the pigs ate, but no one gave him any."}, {"v": 17, "c": 15, "t": "But when he came to himself he said, ‘How many hired servants of my father’s have bread enough to spare, and I’m dying with hunger!"}, {"v": 18, "c": 15, "t": "I will get up and go to my father, and will tell him, “Father, I have sinned against heaven, and in your sight."}, {"v": 19, "c": 15, "t": "I am no more worthy to be called your son. Make me as one of your hired servants.”’"}, {"v": 20, "c": 15, "t": "“He arose, and came to his father. But while he was still far off, his father saw him, and was moved with compassion, and ran, and fell on his neck, and kissed him."}, {"v": 21, "c": 15, "t": "The son said to him, ‘Father, I have sinned against heaven, and in your sight. I am no longer worthy to be called your son.’"}, {"v": 22, "c": 15, "t": "“But the father said to his servants, ‘Bring out the best robe, and put it on him. Put a ring on his hand, and shoes on his feet."}, {"v": 23, "c": 15, "t": "Bring the fattened calf, kill it, and let us eat, and celebrate;"}, {"v": 24, "c": 15, "t": "for this, my son, was dead, and is alive again. He was lost, and is found.’ They began to celebrate."}]}, {"id": "gratitude", "moment": "gratitude", "title": "Bless the Lord, O My Soul", "reference": "Psalms 103:1-5", "book": "Psalms", "note": "David preaches to his own soul, listing what not to forget: forgiveness, healing, redemption, steadfast love.", "verses": [{"v": 1, "c": 103, "t": "Praise Yahweh, my soul! All that is within me, praise his holy name!"}, {"v": 2, "c": 103, "t": "Praise Yahweh, my soul, and don’t forget all his benefits;"}, {"v": 3, "c": 103, "t": "who forgives all your sins; who heals all your diseases;"}, {"v": 4, "c": 103, "t": "who redeems your life from destruction; who crowns you with loving kindness and tender mercies;"}, {"v": 5, "c": 103, "t": "who satisfies your desire with good things, so that your youth is renewed like the eagle’s."}]}, {"id": "rest", "moment": "rest", "title": "Come to Me and Rest", "reference": "Matthew 11:28-30", "book": "Matthew", "note": "Jesus offers an easy yoke to those worn out by religious burden-carrying. Rest is framed as something learned from him.", "verses": [{"v": 28, "c": 11, "t": "“Come to me, all you who labor and are heavily burdened, and I will give you rest."}, {"v": 29, "c": 11, "t": "Take my yoke upon you, and learn from me, for I am gentle and humble in heart; and you will find rest for your souls."}, {"v": 30, "c": 11, "t": "For my yoke is easy, and my burden is light.”"}]}, {"id": "waiting", "moment": "waiting", "title": "Wait for the Lord", "reference": "Psalms 27:13-14", "book": "Psalms", "note": "A short, resolute psalm of trust: David chooses to believe he will see God's goodness in the land of the living, and tells his heart to be strong.", "verses": [{"v": 13, "c": 27, "t": "I am still confident of this: I will see the goodness of Yahweh in the land of the living."}, {"v": 14, "c": 27, "t": "Wait for Yahweh. Be strong, and let your heart take courage. Yes, wait for Yahweh."}]}], "booksOrder": ["Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth", "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra", "Nehemiah", "Esther", "Job", "Psalms", "Proverbs", "Ecclesiastes", "Song of Solomon", "Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel", "Hosea", "Joel", "Amos", "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah", "Malachi", "Matthew", "Mark", "Luke", "John", "Acts", "Romans", "1 Corinthians", "2 Corinthians", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thessalonians", "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon", "Hebrews", "James", "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"]};

function parseRef(ref) {
  const m = ref.trim().match(/^([1-3]?\s?[A-Za-z ]+?)\s+(\d+)(?::(\d+)(?:-(\d+))?)?$/);
  if (!m) return null;
  let raw = m[1].trim().replace(/\s+/g, ' ');
  let book = Object.keys(CHAPTERS).find(b => b.toLowerCase() === raw.toLowerCase() || b.toLowerCase().replace(/\s/g, '') === raw.toLowerCase().replace(/\s/g, ''));
  if (!book && ALIASES[raw.toLowerCase()]) book = ALIASES[raw.toLowerCase()];
  if (!book) return null;
  return {
    book,
    chapter: +m[2],
    v1: m[3] ? +m[3] : null,
    v2: m[4] ? +m[4] : null
  };
}
function parseApiContent(content) {
  content = content || '';
  if (/\[\d+[-\u2013,]/.test(content)) {
    // grouped/paraphrase versification (e.g. The Message): strip markers, present as flowing text
    const t = content.replace(/\[[\d\u2013,\-\s]+\]/g, ' ').replace(/\s+/g, ' ').trim();
    return t ? [{
      v: null,
      t
    }] : [];
  }
  const parts = content.split(/\[(\d+)\]/);
  const verses = [];
  for (let i = 1; i < parts.length; i += 2) {
    const v = +parts[i];
    const t = (parts[i + 1] || '').replace(/\s+/g, ' ').trim();
    if (t) verses.push({
      v,
      t
    });
  }
  if (verses.length === 0) {
    const t = content.replace(/\s+/g, ' ').trim();
    if (t) verses.push({
      v: null,
      t
    });
  }
  return verses;
}
async function fetchWeb(ref, translation) {
  const r = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=${translation === 'kjv' ? 'kjv' : 'web'}`);
  if (!r.ok) throw new Error("Couldn't find that passage. Try like: John 3:16 or Psalms 23");
  const d = await r.json();
  return {
    reference: d.reference,
    translation: d.translation_name,
    verses: d.verses.map(v => ({
      v: v.verse,
      t: v.text.replace(/\s+/g, ' ').trim()
    })),
    raw: null
  };
}
async function fetchPassage(ref, settings) {
  const t = settings.translation;
  const premium = knownBibles(settings).find(b => b.id === t);
  if (premium) {
    try {
      const p = parseRef(ref);
      if (!p) throw new Error('unparsed');
      const code = CODE[p.book];
      let pid = code + '.' + p.chapter;
      if (p.v1) {
        pid += '.' + p.v1;
        if (p.v2) pid += '-' + code + '.' + p.chapter + '.' + p.v2;
      }
      const key = settings.bibleKey || DEFAULT_BIBLE_KEY;
      const r = await fetch(`https://api.scripture.api.bible/v1/bibles/${t}/passages/${pid}?content-type=text&include-verse-numbers=true&include-titles=false&include-notes=false`, {
        headers: {
          'api-key': key
        }
      });
      if (!r.ok) throw new Error('api ' + r.status);
      const d = await r.json();
      const verses = parseApiContent(d.data.content);
      if (!verses.length) throw new Error('empty');
      return {
        reference: d.data.reference,
        translation: premium.abbr,
        verses,
        raw: null
      };
    } catch (e) {
      // graceful fallback — when the premium key is capped or fails, serve the free WEB text
      return await fetchWeb(ref, 'web');
    }
  }
  return await fetchWeb(ref, t);
}

async function callClaudeMessages(settings, sys, messages) {

function parseLookup(text) {
  const t = (text || '').replace(/__ERR__/, '');
  const m = t.match(/\n?\s*LOOKUP::\s*(.+?)\s*$/);

    body: t.trim(),
    terms: []

  const terms = m[1].split('|').map(s => s.trim().replace(/^[\-\*\d\.\)\s]+/, '')).filter(Boolean).slice(0, 4);
  return {
    body: t.slice(0, m.index).trim(),

  };
}

const MOMENT_KW = {
  anxiety: ['anxious', 'anxiety', 'worry', 'worried', 'worrying', 'nervous', 'panic', 'panicking', 'overthink', 'on edge'],
  fear: ['afraid', 'fear', 'fearful', 'scared', 'terrified', 'dread', 'frightened'],
  burnout: ['burnout', 'burned out', 'burnt out', 'depleted', 'running on empty', 'no energy', 'spent', 'used up'],
  weariness: ['weary', 'tired', 'worn out', 'worn down', 'drained', 'fatigue', 'fatigued', 'exhausted', 'exhaustion'],
  comfort: ['grief', 'grieving', 'grieve', 'sad', 'sadness', 'sorrow', 'loss', 'lost someone', 'mourn', 'mourning', 'hurting', 'heartbroken', 'broken', 'lonely', 'alone'],
  overwhelm: ['overwhelm', 'overwhelmed', 'too much', 'swamped', 'stretched thin', 'no time', 'stressed', 'stress', 'can\'t keep up', 'drowning'],
  shame: ['shame', 'ashamed', 'guilt', 'guilty', 'failed', 'failure', 'unworthy', 'regret', 'not enough', 'messed up', 'condemned'],
  gratitude: ['thankful', 'grateful', 'gratitude', 'blessed', 'joy', 'joyful', 'celebrate', 'celebrating', 'praise'],
  rest: ['rest', 'restless', 'need a break', 'no rest', 'peace', 'still', 'stillness', 'sabbath'],
  waiting: ['waiting', 'wait', 'patience', 'patient', 'delay', 'not yet', 'uncertain', 'uncertainty', 'limbo', 'in between']
};
function matchMoment(text) {
  const t = (text || '').toLowerCase();
  let best = null,
    bestScore = 0;
  for (const [m, words] of Object.entries(MOMENT_KW)) {
    let score = 0;
    words.forEach(w => {
      if (t.includes(w)) score += w.includes(' ') ? 2 : 1;
    });
    if (score > bestScore) {
      bestScore = score;
      best = m;
    }
  }
  return best ? SEED.stories.find(s => s.moment === best) : null;
}
